services:
  - name: "Infrastructure"
    icon: "fas fa-screwdriver-wrench"
    items:
      - name: "Router"
        icon: "fas fa-network-wired"
        subtitle: "Network routing and DHCP"
        tag: "network"
        url: "http://router.lan/"
      - name: "AdGuard Home"
        logo: "https://github.com/homarr-labs/dashboard-icons/blob/main/png/adguard-home.png?raw=true"
        subtitle: "DNS filtering and ad blocking"
        tag: "network"
        url: "http://192.168.100.30:8080/"
      - name: "ArgoCD"
        logo: "https://github.com/homarr-labs/dashboard-icons/blob/main/png/argo-cd.png?raw=true"
        subtitle: "GitOps continuous delivery"
        tag: "gitops"
        url: "https://argocd.192.168.100.30.nip.io/"
  - name: "Applications"
    icon: "fas fa-server"
    items:
      - name: "Home Assistant"
        logo: "https://github.com/homarr-labs/dashboard-icons/blob/main/png/home-assistant.png?raw=true"
        subtitle: "Smart home management"
        tag: "smart-home"
        url: "https://home-assistant.lan/"