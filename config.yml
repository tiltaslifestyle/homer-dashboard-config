services:
  - name: "Infrastructure"
    icon: "fas fa-screwdriver-wrench"
    items:
      - name: "Router"
        # icon: "fas fa-network-wired"
        logo: "https://github.com/homarr-labs/dashboard-icons/blob/main/png/router.png?raw=true"
        subtitle: "Network routing and DHCP"
        tag: "network"
        tagstyle: "is-primary" # This will display the is-primary color! Try changing it to; is-link, is-info, is-success, is-warning or is-danger!
        url: "http://router.lan/"
        target: "_blank"
      - name: "AdGuard Home"
        logo: "https://github.com/homarr-labs/dashboard-icons/blob/main/png/adguard-home.png?raw=true"
        subtitle: "DNS filtering and ad blocking"
        tag: "network"
        tagstyle: "is-primary" # This will display the is-primary color! Try changing
        url: "http://192.168.100.30:8080/"
        target: "_blank"
  - name: "Platform"
    icon: "fas fa-cubes"
    items:
      - name: "ArgoCD"
        logo: "https://github.com/homarr-labs/dashboard-icons/blob/main/png/argo-cd.png?raw=true"
        subtitle: "GitOps continuous delivery"
        tag: "gitops"
        tagstyle: "is-primary" # This will display the is-primary color! Try changing it to; is-link, is-info, is-success, is-warning or is-danger!
        url: "https://argocd.192.168.100.30.nip.io/"
        target: "_blank"
  - name: "Monitoring"
    icon: "fas fa-chart-line"
    items:
      - name: "Uptime Kuma"
        logo: "https://github.com/homarr-labs/dashboard-icons/blob/main/png/uptime-kuma.png?raw=true"
        subtitle: "Simple and powerful monitoring tool"
        tag: "monitoring"
        tagstyle: "is-primary"
        url: "http://uptime-kuma.lan/"
        target: "_blank"
  - name: "Applications"
    icon: "fas fa-server"
    items:
      - name: "Home Assistant"
        logo: "https://github.com/homarr-labs/dashboard-icons/blob/main/png/home-assistant.png?raw=true"
        subtitle: "Smart home management"
        tag: "smart-home"
        tagstyle: "is-primary"
        url: "https://home-assistant.lan/"
        target: "_blank"