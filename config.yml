---
# Homepage configuration
# See https://fontawesome.com/search for icons options

title: "Homepage"
subtitle: "v.2.0.0"
icon: "fas fa-house-laptop"

header: true
footer: '<p><small>This is the Way</small></p>' # set false if you want to hide it

# Optional navbar
links:
  - name: "Github"
    icon: "fab fa-github"
    url: "https://github.com/tiltaslifestyle/homelab"
    target: "_blank" 

# Optional theme customization
theme: default
stylesheet:
  - "assets/custom.css?v=2"

# Optional theme customization (color overrrides)
colors:
  light:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#f5f5f5"
    card-background: "#ffffff"
    text: "#363636"
    text-header: "#ffffff"
    text-title: "#303030"
    text-subtitle: "#424242"
    card-shadow: rgba(0, 0, 0, 0.1)
    link: "#3273dc"
    link-hover: "#363636"
  dark:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#131313"
    card-background: "#2b2b2b"
    text: "#eaeaea"
    text-header: "#ffffff"
    text-title: "#fafafa"
    text-subtitle: "#f5f5f5"
    card-shadow: rgba(0, 0, 0, 0.4)
    link: "#3273dc"
    link-hover: "#ffdd57"

# # Optional message
# message:
